<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1200px;height:630px;}
  .og{
    width:1200px;height:630px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:60px;
    background:
      radial-gradient(80% 60% at 84% -10%, rgba(166,91,75,.22), transparent 60%),
      radial-gradient(70% 65% at 6% 110%, rgba(41,51,76,.6), transparent 60%),
      #14161e;
    color:#f2e9bd;font-family:'Lato',sans-serif;
  }
  .eyebrow{font-weight:700;text-transform:uppercase;letter-spacing:.5em;font-size:22px;color:#f2c894;margin-bottom:26px;}
  .wm{font-family:'Playfair Display',serif;font-weight:600;color:#fff;font-size:96px;line-height:1.02;}
  .rule{width:90px;height:3px;margin:34px 0;background:linear-gradient(90deg,transparent,#f2c894,transparent);}
  .logos{display:flex;align-items:center;justify-content:center;gap:64px;}
  .logos .wt{height:74px;}
  .logos .bc{height:150px;border-radius:10px;}
  .sub{margin-top:8px;}
</style></head>
<body>
  <div class="og">
    <div class="eyebrow">Salem, Massachusetts</div>
    <div class="wm">Witch City Experiences</div>
    <div class="rule"></div>
    <div class="logos">
      <img class="wt" src="assets/wcwt-horizontal-white.webp" alt="" />
      <img class="bc" src="assets/wcbc-primary.png" alt="" />
    </div>
  </div>
</body></html>
